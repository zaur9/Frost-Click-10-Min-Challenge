<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Frost Click: 10-Min Challenge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ====== START SCREEN ====== -->
  <div id="start-screen">
    <h1>❄️ Frost Click: Network Battle</h1>
    <p>Center game • ApeChain vs Somnia • Top 10 + team total score</p>
    <div id="start-top-actions">
      <button id="start-connect-wallet">Connect Wallet</button>
      <button id="start-show-leaderboard">Show Battle Top 10</button>
      <!-- Music toggle on start screen (right top under leaderboard) -->
      <button id="music-toggle-start" class="music-btn">Music: OFF</button>
    </div>
    <button id="start-btn">Start Game</button>
  </div>

  <!-- ====== GAME AREA ====== -->
  <div id="game">
    <div id="playfield-bg" aria-hidden="true"></div>
    <div id="battle-layout" aria-hidden="true">
      <div id="ape-side" class="battle-side">
        <h2>APECHAIN TOP 10</h2>
        <div id="ape-total" class="team-total">Total: 0</div>
        <ol id="ape-top-list" class="side-top-list">
          <li>No data</li>
        </ol>
      </div>
      <div id="somnia-side" class="battle-side">
        <h2>SOMNIA TOP 10</h2>
        <div id="somnia-total" class="team-total">Total: 0</div>
        <ol id="somnia-top-list" class="side-top-list">
          <li>No data</li>
        </ol>
      </div>
    </div>

    <div id="score">Score: 0</div>
    <!-- Music toggle in game HUD -->
    <button id="music-toggle-game" class="music-btn">Music: OFF</button>
    <div id="timer">10:00</div>

    <button id="ape-connect-wallet">Connect Wallet</button>
    <button id="connect-wallet">Connect Wallet</button>

    <!-- Pause -->
    <button id="pause-btn">Pause</button>

    <div id="pause-overlay">
      <span>PAUSED</span>
      <button id="resume-btn">Resume</button>
    </div>
    
    <!-- Game Over -->
    <div id="game-over">
      <h2 id="result-title">Game Over!</h2>
      <p id="final-score">Your score: 0</p>
      <p id="time-survived">Time: 0s</p>
      <button id="restart">Play Again</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>

  <!-- Modules (correct order) -->
  <script type="module" src="config.js"></script>
  <script type="module" src="game.js"></script>
  <script type="module" src="web3.js"></script>

  <!-- Snow background -->
  <script>
    function createSnow() {
      const snow = document.createElement("div");
      snow.classList.add("snowflake");
      snow.textContent = "•";
      snow.style.left = Math.random() * 100 + "vw";
      snow.style.fontSize = (8 + Math.random() * 8) + "px";
      snow.style.animationDuration = (6 + Math.random() * 8) + "s";
      document.body.appendChild(snow);
      setTimeout(() => snow.remove(), 15000);
    }
    setInterval(createSnow, 220);
  </script>

  <!-- Background music element -->
  <audio id="bg-music" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

</body>
</html>
